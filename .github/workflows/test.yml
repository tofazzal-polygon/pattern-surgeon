name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core
        run: |
          sudo apt-get update -q
          sudo apt-get install -y bats
      - name: Run all test suites
        run: bats tests/scripts/
